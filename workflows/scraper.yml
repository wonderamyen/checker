name: Steam Scraper

on:
  workflow_dispatch:
    inputs:
      seed_steamid:
        description: 'Starting SteamID64 for the scraper'
        required: true
        default: '76561199258852510'
      account_limit:
        description: 'Maximum number of accounts to scrape'
        required: true
        default: '50'
        type: number

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run Scraper
      env:
        SEED_STEAMID: ${{ github.event.inputs.seed_steamid }}
        ACCOUNT_LIMIT: ${{ github.event.inputs.account_limit }}

        TARGET_SKINS: "Knife,Gloves"
        MAX_LEVEL: "15"
        MAX_CS2_HOURS: "1500"
        DELAY_BETWEEN: "5.0"
        
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      run: python github_scraper.py
